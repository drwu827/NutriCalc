<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NutriCalc｜營養計算器與科學資料庫</title>
<meta name="description" content="NutriCalc 免費繁體中文營養與體態分析工具，整合 TDEE、FFMI、BMI、WHtR、每日餐次規劃與科學研究資料庫。">
<style>
:root {
  --bg: #f6f7f9;
  --card: #ffffff;
  --text: #202124;
  --muted: #6b7280;
  --line: #e3e5e8;
  --active: #111111;
}
* { box-sizing: border-box; }
html, body { margin: 0; height: 100%; background: var(--bg); color: var(--text); }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC",
               "Microsoft JhengHei", Arial, sans-serif;
  overflow: hidden;
}
.shell {
  height: 100%;
  display: flex;
  flex-direction: column;
}
.header {
  flex: 0 0 auto;
  position: relative;
  z-index: 10;
  background: rgba(255,255,255,.97);
  border-bottom: 1px solid var(--line);
  box-shadow: 0 1px 3px rgba(0,0,0,.04);
}
.header-inner {
  max-width: 1120px;
  margin: 0 auto;
  padding: 10px 14px;
}
.brand-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 12px;
  margin-bottom: 9px;
}
.brand {
  min-width: 0;
}
.brand-title {
  font-weight: 850;
  font-size: 19px;
  line-height: 1.2;
}
.brand-subtitle {
  color: var(--muted);
  font-size: 12px;
  margin-top: 2px;
}
.version {
  flex: 0 0 auto;
  color: var(--muted);
  font-size: 11px;
  border: 1px solid var(--line);
  border-radius: 999px;
  padding: 4px 8px;
}
.tabs {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}
.tab {
  appearance: none;
  border: 1px solid var(--active);
  border-radius: 999px;
  padding: 10px 12px;
  background: white;
  color: var(--active);
  font-size: 15px;
  font-weight: 800;
  cursor: pointer;
}
.tab.active {
  background: var(--active);
  color: white;
}
.content {
  flex: 1 1 auto;
  min-height: 0;
  position: relative;
  background: white;
}
.panel {
  position: absolute;
  inset: 0;
  display: none;
}
.panel.active {
  display: block;
}
iframe {
  display: block;
  width: 100%;
  height: 100%;
  border: 0;
  background: white;
}
@media (max-width: 640px) {
  .header-inner { padding: 9px 10px; }
  .brand-title { font-size: 17px; }
  .brand-subtitle { font-size: 11px; }
  .version { display: none; }
  .tab { font-size: 14px; padding: 9px 6px; }
}
</style>
</head>
<body>
<div class="shell">
  <header class="header">
    <div class="header-inner">
      <div class="brand-row">
        <div class="brand">
          <div class="brand-title">NutriCalc</div>
          <div class="brand-subtitle">營養計算器 × 科學實證資料庫</div>
        </div>
        <div class="version">Calculator v4.3｜Database v2.3</div>
      </div>
      <nav class="tabs" aria-label="主要功能">
        <button id="calculatorTab" class="tab active" type="button"
                onclick="switchPanel('calculator')">營養計算器</button>
        <button id="databaseTab" class="tab" type="button"
                onclick="switchPanel('database')">科學資料庫</button>
      </nav>
    </div>
  </header>

  <main class="content">
    <section id="calculatorPanel" class="panel active">
      <iframe id="calculatorFrame" title="NutriCalc 營養計算器"></iframe>
    </section>
    <section id="databasePanel" class="panel">
      <iframe id="databaseFrame" title="NutriCalc 科學資料庫"></iframe>
    </section>
  </main>
</div>

function decodeSource(encoded) {
  const binary = atob(encoded);
  const bytes = Uint8Array.from(binary, c => c.charCodeAt(0));
  return new TextDecoder("utf-8").decode(bytes);
}

document.getElementById("calculatorFrame").srcdoc = decodeSource(calculatorSource);
document.getElementById("databaseFrame").srcdoc = decodeSource(databaseSource);

function switchPanel(name) {
  const isCalculator = name === "calculator";

  document.getElementById("calculatorPanel").classList.toggle("active", isCalculator);
  document.getElementById("databasePanel").classList.toggle("active", !isCalculator);
  document.getElementById("calculatorTab").classList.toggle("active", isCalculator);
  document.getElementById("databaseTab").classList.toggle("active", !isCalculator);

  history.replaceState(null, "", isCalculator ? "#calculator" : "#database");
}

window.addEventListener("DOMContentLoaded", () => {
  if (location.hash === "#database") switchPanel("database");
});
</script>
