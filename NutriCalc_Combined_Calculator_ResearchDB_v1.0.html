&lt;summary class=&quot;collapsible-summary&quot;&gt;NutriCalc 使用指南與常見問題 FAQ&lt;/summary&gt;

&lt;h2&gt;FFMI 是什麼？&lt;/h2&gt;
&lt;p&gt;FFMI（Fat-Free Mass Index，去脂體重指數）是用去脂體重除以身高平方得到的身體組成指標。和單純看體重或 BMI 不同，FFMI 更適合評估肌肉量，尤其適合重訓、減脂或增肌族群。NutriCalc 會在輸入體脂率後自動計算 LBM 去脂體重與 FFMI，並提供男性與女性標準化參考範圍。&lt;/p&gt;

&lt;h2&gt;FFMI 正常值是多少？&lt;/h2&gt;
&lt;p&gt;一般來說，男性 FFMI 約 18–20 屬於一般成人範圍，20–22 常見於規律訓練者，22–25 代表高肌肉量；女性 FFMI 通常比男性低約 3–4 點，15–17 屬於一般範圍，17–19 常見於規律訓練者。FFMI 公式本身不使用性別與年齡，但實際解讀仍應考慮性別、年齡、訓練年資與體脂測量誤差。&lt;/p&gt;

&lt;h2&gt;WHtR 腰高比是什麼？&lt;/h2&gt;
&lt;p&gt;WHtR（Waist-to-Height Ratio，腰高比）是腰圍除以身高的比例，用來評估腰圍相對於身高是否偏高。常見參考值是 WHtR 小於 0.5 較理想。NutriCalc 可透過腰圍與身高快速計算 WHtR，作為 BMI 與體脂率之外的輔助判斷。&lt;/p&gt;

&lt;h2&gt;Garmin 的 TDEE 準嗎？&lt;/h2&gt;
&lt;p&gt;Garmin 會根據心率、活動量、運動紀錄與個人資料估算熱量消耗，但穿戴裝置仍可能受心率準確度、運動類型與演算法影響。建議把 Garmin TDEE 視為起始參考，再搭配 2–4 週體重變化進行修正。NutriCalc 的 TDEE 模型則以 BMR 乘上活動係數，適合用來建立初始飲食規劃。&lt;/p&gt;

&lt;h2&gt;InBody 怎麼看？&lt;/h2&gt;
&lt;p&gt;InBody 常見重點包括體重、體脂率、脂肪量、骨骼肌量與身體水分。對減脂族群來說，應同時觀察脂肪量下降與肌肉量是否維持；對增肌族群來說，應注意體重增加是否伴隨骨骼肌量上升。NutriCalc 可使用體重與體脂率計算 LBM、FFMI 與巨量營養素建議。&lt;/p&gt;

&lt;h2&gt;減脂蛋白質要吃多少？&lt;/h2&gt;
&lt;p&gt;減脂期間為了維持肌肉量，蛋白質攝取通常會比一般健康飲食更高。NutriCalc 的減脂模式預設蛋白質為 2.2 g/kg，並以目標熱量扣除蛋白質與脂肪熱量後，將剩餘熱量分配給碳水化合物。實際攝取量仍可依訓練量、飽足感、腎臟健康狀況與醫療建議調整。&lt;/p&gt;

t;Obesity&quot;,bmiNote:&quot;BMI does not distinguish muscle from fat.&quot;,ffmiDef:&quot;FFMI definition and reference&quot;,maleFfmi:&quot;Male Standardized FFMI&quot;,femaleFfmi:&quot;Female Standardized FFMI&quot;,maleFfmi:&quot;Male Standardized FFMI&quot;,femaleFfmi:&quot;Female Standardized FFMI&quot;,ffmiFormula:&quot;FFMI = fat-free mass(kg) ÷ height(m)²&quot;,leanMassFormula:&quot;Fat-free mass = weight × (1 − body fat %)&quot;,reference:&quot;Reference&quot;,ffmiLow:&quot;Low&quot;,ffmiAverage:&quot;Average&quot;,ffmiGood:&quot;Good&quot;,ffmiHigh:&quot;High&quot;,ffmiVeryHigh:&quot;Very high&quot;,ffmiNote:&quot;FFMI requires body-fat percentage. The formula itself does not use sex or age; height is already normalized, but interpretation can vary by sex, age, training history, and body-fat measurement method.&quot;,activityDef:&quot;Activity Definitions&quot;,activityFactorNote:&quot;* indicates the activity factor used in TDEE total daily energy expenditure = BMR × activity factor.&quot;,calorieModel:&quot;Calorie Model and Preset Parameters&quot;,defaultCalorieModel:&quot;Default Calorie Model&quot;,remainingFat:&quot;Based on fat range&quot;,proteinRange:&quot;Recommended Protein Range&quot;,carbRange:&quot;Recommended Carbohydrate Range&quot;,fatRange:&quot;&quot;,cchTitle:&quot;CCH: Caloric constraint hypothesis&quot;,cchText:&quot;*CCH means that when total calories are fixed, higher protein and carbohydrate targets leave fewer calories for fat. If protein, carbohydrate, and fat targets exceed total calories, one of them must be reduced. In NutriCalc, fat is calculated from remaining calories, so the CCH upper limit depends on each person’s calorie target and macro settings.&quot;,bmiExplain:&quot;BMI note&quot;,carbFormulaTitle:&quot;Carbohydrate reference starting values&quot;,initialCarbs:&quot;Carbohydrate reference&quot;,finalCarbs:&quot;Carbohydrate&quot;,minimumFat:&quot;Minimum fat&quot;,formulaTitle:&quot;Formulas&quot;,bmrFormula:&quot;  const fRatio=+document.getElementById(&#x27;fatRatio&#x27;).value;
 const s=genderVal===&#x27;male&#x27;?5:-161;
 const bmr=r(10*w+6.25*h-5*age+s);
 const bmi=(w/((h/100)**2)).toFixed(1);
 const lbm=bf?w*(1-bf/100):0;
 const ffmi=bf?(lbm/((h/100)**2)).toFixed(1):&#x27;&#x27;;
 const whtr=waist?(waist/h).toFixed(2):&#x27;&#x27;;
 const acts={
  zh:[[&#x27;無訓練&#x27;,1.2],[&#x27;輕度訓練&#x27;,1.375],[&#x27;中度訓練&#x27;,1.55],[&#x27;高強度訓練&#x27;,1.725],[&#x27;極高強度訓練&#x27;,1.9]],
  en:[[&#x27;No Training&#x27;,1.2],[&#x27;Light Training&#x27;,1.375],[&#x27;Moderate Training&#x27;,1.55],[&#x27;High-intensity Training&#x27;,1.725],[&#x27;Extreme Training&#x27;,1.9]],
  ja:[[&#x27;トレーニングなし&#x27;,1.2],[&#x27;軽度トレーニング&#x27;,1.375],[&#x27;中等度トレーニング&#x27;,1.55],[&#x27;高強度トレーニング&#x27;,1.725],[&#x27;極高強度トレーニング&#x27;,1.9]]
 }[currentLang];

 const label={

  goal:currentLang===&#x27;zh&#x27;?&#x27;目標&#x27;:currentLang===&#x27;en&#x27;?&#x27;Goal&#x27;:&#x27;目標&#x27;,

  weight:currentLang===&#x27;zh&#x27;?&#x27;體重&#x27;:currentLang===&#x27;en&#x27;?&#x27;Weight&#x27;:&#x27;体重&#x27;,
  height:currentLang===&#x27;zh&#x27;?&#x27;身高&#x27;:currentLang===&#x27;en&#x27;?&#x27;Height&#x27;:&#x27;身長&#x27;,
  age:currentLang===&#x27;zh&#x27;?&#x27;年齡&#x27;:currentLang===&#x27;en&#x27;?&#x27;Age&#x27;:&#x27;年齢&#x27;,

  waist:currentLang===&#x27;zh&#x27;?&#x27;腰圍&#x27;:currentLang===&#x27;en&#x27;?&#x27;Waist&#x27;:&#x27;ウエスト&#x27;,

  bmr:currentLang===&#x27;zh&#x27;?&#x27;BMR 基礎代謝率&#x27;:currentLang===&#x27;en&#x27;?&#x27;BMR Basal Metabolic Rate&#x27;:&#x27;BMR 基礎代謝量&#x27;,
  ffmi:currentLang===&#x27;zh&#x27;?&#x27;FFMI 去脂體重指數&#x27;:currentLang===&#x27;en&#x27;?&#x27;FFMI Fat-Free Mass Index&#x27;:&#x27;FFMI 除脂肪量指数&#x27;,
  lbm:currentLang===&#x27;zh&#x27;?&#x27;LBM 去脂體重&#x27;:currentLang===&#x27;en&#x27;?&#x27;LBM Lean Body Mass&#x27;:&#x27;LBM 除脂肪量&#x27;,
  whtr:currentLang===&#x27;zh&#x27;?&#x27;WHtR 腰高比&#x27;:currentLang===&#x27;en&#x27;?&#x27;WHtR Waist-to-Height Ratio&#x27;:&#x27;WHtR ウエスト身長比&#x27;,
  tdee:currentLang===&#x27;zh&#x27;?&#x27;TDEE 每日總消耗熱量&#x27;:currentLang===&#x27;en&#x27;?&#x27;TDEE Total Daily Energy Expenditure&#x27;:&#x27;TDEE 1日の総消費カロリー&#x27;,
  targetCalories:t(&#x27;targetCalories&#x27;),

 };

 const lines=[];
 const sep=&#x27;────────────&#x27;;

 lines.push(label.title);

 lines.push(sep);
 lines.push(label.basic);
 lines.push(sep);
 if(name) lines.push(`${label.name}：${name}`);
 lines.push(`${label.weight}：${wi} ${unit}`);
 lines.push(`${label.height}：${h} cm`);

 if(bf) lines.push(`${label.bodyfat}：${bf}%`);

 lines.push(&#x27;&#x27;);
 lines.push(sep);

 lines.push(`${label.lbm}：${lbm?r(lbm)+&#x27; kg&#x27;:t(&#x27;notEntered&#x27;)}`);

 lines.push(&#x27;&#x27;);

 });

}

<script>
function showPanel(id){
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  if(id==='calculator') document.querySelectorAll('.tab-btn')[0].classList.add('active');
  if(id==='database') document.querySelectorAll('.tab-btn')[1].classList.add('active');
  location.hash = id;
}
window.addEventListener('DOMContentLoaded',()=>{
  const hash = location.hash.replace('#','');
  if(hash==='database') showPanel('database');
});
</script>
